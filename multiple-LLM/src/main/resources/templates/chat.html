<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-LLM ChatBot</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: #343541;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            font-size: 20px;
            font-weight: bold;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info {
            font-size: 14px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .user-bubble {
            background: #0078fe;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        .ai-bubble {
            background: white;
            border: 1px solid #dcdcdc;
            color: #333;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
        .model-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            text-align: left;
        }
        #input-section {
            padding: 10px;
            background: #fff;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ddd;
        }
        textarea {
            flex: 1;
            resize: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
        }
        button {
            padding: 12px 20px;
            background: #10a37f;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-bubble {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">🤖 Multi-LLM ChatBot</div>
    <div class="header-right">
        <div class="user-info">Welcome, <span id="username">User</span>!</div>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
</header>

<div id="chat-container">
    <div style="display: flex; flex-direction: column; align-items: flex-start;">
        <div class="bubble ai-bubble">Hello! I'm your AI assistant. How can I help you today?</div>
        <div class="model-label">🤖 AI Assistant</div>
    </div>
</div>

<div id="input-section">
    <textarea id="user-input" placeholder="Type your message here..." rows="2"></textarea>
    <button onclick="askAI()" id="send-btn">Send</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const usernameSpan = document.getElementById('username');

    // Get current user
    async function getCurrentUser() {
        try {
            const response = await fetch('/api/user');
            const username = await response.text();
            usernameSpan.textContent = username;
        } catch (error) {
            console.error('Error getting user:', error);
        }
    }

    function addBubble(text, type, model = "") {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${type}-bubble`;
        bubble.textContent = text;

        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';

        if (type === "user") {
            wrapper.style.alignItems = 'flex-end';
        } else {
            wrapper.style.alignItems = 'flex-start';
        }

        wrapper.appendChild(bubble);

        if (type === "ai" && model) {
            const label = document.createElement('div');
            label.className = "model-label";
            label.textContent = `🤖 ${model}`;
            wrapper.appendChild(label);
        }

        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addErrorBubble(errorMessage) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble error-bubble';
        bubble.textContent = errorMessage;

        const wrapper = document.createElement('div');
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = 'flex-start';
        wrapper.appendChild(bubble);

        const label = document.createElement('div');
        label.className = "model-label";
        label.textContent = "❌ Error";
        wrapper.appendChild(label);

        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function askAI() {
        const message = userInput.value.trim();
        if (!message) return;

        addBubble(message, "user");
        userInput.value = '';
        sendBtn.disabled = true;
        userInput.disabled = true;

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            if (data.success) {
                addBubble(data.response, "ai", "AI Assistant");
            } else {
                addErrorBubble(data.error || "Unknown error occurred");
            }
        } catch (err) {
            console.error('Error:', err);
            if (err.message.includes('401')) {
                addErrorBubble("Session expired. Please login again.");
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                addErrorBubble("Network error: " + err.message);
            }
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    }

    // Auto-resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // Allow Enter to submit (but Shift+Enter for new line)
    userInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            askAI();
        }
    });

    // Focus on input when page loads
    window.addEventListener('load', function() {
        getCurrentUser();
        userInput.focus();
    });
</script>

</body>
</html>
